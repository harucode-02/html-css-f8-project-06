<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio</title>
        <!-- Google Fonts: DM Sans -->
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./assets/reset.css" />
        <link rel="stylesheet" href="./assets/grid.css" />
        <link rel="stylesheet" href="./assets/styles.css" />
    </head>
    <body>
        <!-- Header Navigation -->
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <div class="header__email-wrapper">
                        <div class="header__letter">
                            <img
                                src="./assets/icons/header-nav-letter.svg"
                                alt="Heart Letter"
                                class="header__letter-icon"
                            />
                        </div>
                        <a
                            href="mailto:hi@arif.interactive"
                            class="header__email"
                            >hi@arif.interactive</a
                        >
                    </div>
                    <img
                        src="./assets/icons/header-nav-face-emoji.png"
                        alt="Face Emoji"
                        class="header__face-emoji"
                    />
                    <nav class="navbar">
                        <ul class="navbar__list">
                            <li class="navbar__link-item">
                                <a href="#!">Projects</a>
                            </li>
                            <li class="navbar__link-item">
                                <a href="#!">Journey</a>
                            </li>
                            <li class="navbar__link-item">
                                <a href="#!">Service</a>
                            </li>
                            <li class="navbar__link-item">
                                <a href="#!">Contact</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <div class="row hero__inner">
                    <div class="col-lg-5 col-12">
                        <!-- Hero Media -->
                        <div class="hero__media">
                            <img
                                src="./assets/images/hero-avatar.png"
                                alt="Hero Avatar"
                                class="hero__avatar"
                            />
                            <img
                                src="./assets/icons/hero-lines-bg.png"
                                alt="Hero Decor Background"
                                class="hero__decor-bg"
                            />
                        </div>
                    </div>
                    <div class="col-lg-5 offset-lg-1 col-12">
                        <!-- Hero Content -->
                        <div class="hero__content">
                            <h1 class="hero__title">An Interactive Designer</h1>
                            <p class="hero__desc">
                                Lorem ipsum dolor sit amet, consectetur
                                adipiscing elit. In urna, non nisl tincidunt ut
                                elementum turpis.
                            </p>
                            <a href="#!" class="btn btn__primary"
                                >Book a Call</a
                            >
                            <a href="#!" class="hero__more-info">My Works</a>
                            <div class="hero__social-media">
                                <span>Follow me on: </span>
                                <div class="hero__social-list">
                                    <a
                                        href="#!"
                                        class="hero__social-link"
                                        aria-label="Behance"
                                    >
                                        <img
                                            src="./assets/icons/hero-behance.svg"
                                            alt="Behance"
                                        />
                                    </a>
                                    <a
                                        href="#!"
                                        class="hero__social-link"
                                        aria-label="Dribble"
                                    >
                                        <img
                                            src="./assets/icons/hero-dribble.svg"
                                            alt="Dribble"
                                        />
                                    </a>
                                    <a
                                        href="#!"
                                        class="hero__social-link"
                                        aria-label="Instagram"
                                    >
                                        <img
                                            src="./assets/icons/hero-instagram.svg"
                                            alt="Instagram"
                                        />
                                    </a>
                                </div>
                            </div>
                            <img
                                src="./assets/icons/hero-small-lines-bg.svg"
                                alt="Hero Decor Outline"
                                class="hero__decor-outline"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- End .container -->
        <!-- Footer Section -->
    </body>
</html>
